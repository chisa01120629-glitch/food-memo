<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>食材在庫管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Poppins:wght@600;700&display=swap');

  :root {
    --green: #2E7D32;
    --green-light: #E8F5E9;
    --green-mid: #A5D6A7;
    --yellow: #F9A825;
    --yellow-light: #FFF9C4;
    --red: #C62828;
    --red-light: #FFEBEE;
    --blue: #1565C0;
    --blue-light: #E3F2FD;
    --gray: #F5F5F5;
    --text: #212121;
    --text-light: #757575;
    --white: #FFFFFF;
    --shadow: 0 2px 8px rgba(0,0,0,0.12);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #F0F4F0;
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ヘッダー */
  .header {
    background: var(--green);
    color: white;
    padding: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-sub { font-size: 11px; opacity: 0.8; margin-top: 2px; }

  /* 月ナビゲーション */
  .month-nav {
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 9px 16px;
    border-bottom: 1px solid #E0E0E0;
    position: sticky;
    top: 61px;
    z-index: 99;
  }
  .month-nav-btn {
    background: none;
    border: 1.5px solid #E0E0E0;
    border-radius: 8px;
    width: 30px;
    height: 30px;
    font-size: 14px;
    cursor: pointer;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .month-nav-btn:active { background: var(--gray); }
  .month-label {
    font-size: 15px;
    font-weight: 700;
    min-width: 110px;
    text-align: center;
    color: var(--text);
  }
  .month-label.past { color: var(--text-light); }
  .btn-today {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1.5px solid var(--green);
    background: white;
    color: var(--green);
    cursor: pointer;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    display: none;
  }
  .btn-today.show { display: block; }

  /* タブ */
  .tabs {
    display: flex;
    background: white;
    border-bottom: 2px solid #E0E0E0;
    position: sticky;
    top: 109px;
    z-index: 98;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-light);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .tab.active {
    color: var(--green);
    border-bottom-color: var(--green);
  }

  /* アラートバナー */
  .alert-banner {
    margin: 12px;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    display: none;
  }
  .alert-banner.show { display: block; }
  .alert-banner.red { background: var(--red-light); color: var(--red); border-left: 4px solid var(--red); }
  .alert-banner.yellow { background: var(--yellow-light); color: #E65100; border-left: 4px solid var(--yellow); }

  /* セクション */
  .section { padding: 8px 12px; }
  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    padding: 0 4px;
  }

  /* 食材カード */
  .item-card {
    background: white;
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    border-left: 4px solid #E0E0E0;
    transition: all 0.2s;
  }
  .item-card.urgent { border-left-color: var(--red); background: #FFF8F8; }
  .item-card.warning { border-left-color: var(--yellow); background: #FFFDF0; }
  .item-card.ok { border-left-color: var(--green); }
  .item-card.status-used { border-left-color: var(--green); background: #F1FBF1; opacity: 0.72; }
  .item-card.status-discarded { border-left-color: var(--red); background: #FFF4F4; opacity: 0.72; }

  .item-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .item-name {
    font-size: 15px;
    font-weight: 700;
    flex: 1;
  }
  .badge-wrap { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }

  .item-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .badge-urgent   { background: var(--red-light);    color: var(--red); }
  .badge-warning  { background: var(--yellow-light);  color: #E65100; }
  .badge-ok       { background: var(--green-light);   color: var(--green); }
  .badge-frozen   { background: #E3F2FD;              color: var(--blue); }
  .badge-used     { background: var(--green-light);   color: var(--green); }
  .badge-discard  { background: var(--red-light);     color: var(--red); }

  .item-info {
    display: flex;
    gap: 12px;
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-light);
    flex-wrap: wrap;
  }
  .item-info span { display: flex; align-items: center; gap: 3px; }

  .item-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .qty-control {
    display: flex;
    align-items: center;
    border: 1.5px solid #E0E0E0;
    border-radius: 8px;
    overflow: hidden;
  }
  .qty-btn {
    background: var(--gray);
    border: none;
    width: 32px;
    height: 32px;
    font-size: 18px;
    cursor: pointer;
    color: var(--text);
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qty-btn:active { background: #DDD; }
  .qty-display {
    min-width: 36px;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    padding: 0 4px;
  }
  .btn-freeze {
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1.5px solid var(--blue);
    background: white;
    color: var(--blue);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }
  .btn-freeze.frozen { background: var(--blue); color: white; }

  .btn-used {
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1.5px solid var(--green);
    background: white;
    color: var(--green);
    cursor: pointer;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }
  .btn-used:active { background: var(--green-light); }

  .btn-discard {
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1.5px solid var(--red);
    background: white;
    color: var(--red);
    cursor: pointer;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }
  .btn-discard:active { background: var(--red-light); }

  .btn-restore {
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1.5px solid #BDBDBD;
    background: white;
    color: var(--text-light);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }

  .btn-delete {
    margin-left: auto;
    background: none;
    border: none;
    color: #BDBDBD;
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
  }

  .frozen-note { font-size: 11px; color: var(--blue); margin-top: 4px; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--green);
    color: white;
    border: none;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(46,125,50,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: transform 0.2s;
  }
  .fab:active { transform: scale(0.92); }

  /* モーダル */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px 16px 32px;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: var(--text-light);
  }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 13px; font-weight: 700; margin-bottom: 6px; display: block; }
  .form-input, .form-select {
    width: 100%;
    padding: 12px;
    border: 1.5px solid #E0E0E0;
    border-radius: 10px;
    font-size: 15px;
    font-family: 'Noto Sans JP', sans-serif;
    background: white;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus { outline: none; border-color: var(--green); }
  .preset-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-top: 8px;
  }
  .preset-btn {
    padding: 8px 4px;
    border: 1.5px solid #E0E0E0;
    border-radius: 8px;
    background: white;
    font-size: 12px;
    cursor: pointer;
    text-align: center;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }
  .preset-btn.selected { background: var(--green-light); border-color: var(--green); color: var(--green); font-weight: 700; }
  .date-hint { font-size: 11px; color: var(--text-light); margin-top: 4px; }
  .btn-submit {
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .btn-submit:active { background: #1B5E20; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ルール */
  .rules-card {
    background: white;
    border-radius: var(--radius);
    padding: 16px;
    margin: 12px;
    box-shadow: var(--shadow);
  }
  .rule-item {
    display: flex;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid #F0F0F0;
    font-size: 13px;
    align-items: flex-start;
  }
  .rule-item:last-child { border-bottom: none; }
  .rule-icon { font-size: 20px; flex-shrink: 0; }
  .budget-card {
    background: var(--yellow-light);
    border-radius: var(--radius);
    padding: 16px;
    margin: 0 12px 12px;
    border: 2px solid var(--yellow);
  }
  .budget-title { font-size: 13px; font-weight: 700; color: #E65100; margin-bottom: 10px; }
  .budget-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
  .budget-amount { font-weight: 700; color: var(--green); }

  /* レポート */
  .report-card {
    background: white;
    border-radius: var(--radius);
    padding: 16px;
    margin: 12px;
    box-shadow: var(--shadow);
  }
  .report-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--text);
  }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-box {
    background: var(--gray);
    border-radius: 10px;
    padding: 12px 6px;
    text-align: center;
  }
  .stat-num { font-size: 26px; font-weight: 700; line-height: 1; }
  .stat-num.green { color: var(--green); }
  .stat-num.red   { color: var(--red); }
  .stat-num.gray  { color: var(--text-light); }
  .stat-label { font-size: 11px; color: var(--text-light); margin-top: 4px; }
  .stat-pct   { font-size: 12px; font-weight: 700; margin-top: 2px; }

  .progress-wrap { margin-bottom: 10px; }
  .progress-label { font-size: 12px; color: var(--text-light); margin-bottom: 4px; }
  .progress-bar {
    height: 10px;
    background: #E0E0E0;
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.5s ease;
  }
  .progress-fill.green { background: var(--green); }
  .progress-fill.red   { background: var(--red); }

  .advice-box {
    margin-top: 12px;
    padding: 10px 12px;
    background: var(--gray);
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
  }

  .cat-row {
    display: flex;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #F5F5F5;
    font-size: 13px;
    gap: 6px;
  }
  .cat-row:last-child { border-bottom: none; }
  .cat-name { flex: 1; }
  .cat-nums { font-size: 12px; color: var(--text-light); white-space: nowrap; }
  .loss-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .loss-high { background: var(--red-light);    color: var(--red); }
  .loss-mid  { background: var(--yellow-light);  color: #E65100; }
  .loss-low  { background: var(--green-light);   color: var(--green); }
  .loss-none { background: var(--gray);          color: var(--text-light); }
</style>
</head>
<body>

<div class="header">
  <h1>🥦 食材在庫管理</h1>
  <div class="header-sub">チサちゃんの冷蔵庫・食品ストック</div>
</div>

<div class="month-nav">
  <button class="month-nav-btn" onclick="prevMonth()">◀</button>
  <span class="month-label" id="month-label"></span>
  <button class="month-nav-btn" onclick="nextMonth()">▶</button>
  <button class="btn-today" id="btn-today" onclick="goToCurrentMonth()">今月に戻る</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('all')">🏠 全部</div>
  <div class="tab" onclick="switchTab('veggie')">🥬 野菜</div>
  <div class="tab" onclick="switchTab('meat')">🥩 肉・魚</div>
  <div class="tab" onclick="switchTab('dairy')">🥛 乳製品</div>
  <div class="tab" onclick="switchTab('fruit')">🍎 果物</div>
  <div class="tab" onclick="switchTab('storage')">🥫 保存食</div>
  <div class="tab" onclick="switchTab('report')">📊 レポート</div>
  <div class="tab" onclick="switchTab('rules')">📋 ルール</div>
</div>

<div id="alert-urgent" class="alert-banner red"></div>
<div id="alert-warning" class="alert-banner yellow"></div>

<div id="content"></div>

<button class="fab" id="fab" onclick="openAddModal()">＋</button>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">
      食材を追加
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <select class="form-select" id="input-category" onchange="onCategoryChange()">
        <option value="veggie">🥬 野菜</option>
        <option value="meat">🥩 肉・魚</option>
        <option value="dairy">🥛 乳製品・発酵食品</option>
        <option value="fruit">🍎 果物</option>
        <option value="storage">🥫 保存食</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">食材名</label>
      <div class="preset-grid" id="preset-grid"></div>
      <input type="text" class="form-input" id="input-name" placeholder="食材名を入力" style="margin-top:8px">
    </div>
    <div class="form-group">
      <label class="form-label">数量</label>
      <input type="number" class="form-input" id="input-qty" value="1" min="1">
    </div>
    <div class="form-group" id="group-expiry">
      <label class="form-label">賞味期限</label>
      <input type="date" class="form-input" id="input-expiry">
      <div class="date-hint" id="expiry-hint"></div>
    </div>
    <div class="form-group" id="group-freeze" style="display:none">
      <label class="form-label">冷凍する？</label>
      <select class="form-select" id="input-freeze">
        <option value="no">いいえ（冷蔵）</option>
        <option value="yes">はい（冷凍）</option>
      </select>
    </div>
    <button class="btn-submit" onclick="addItem()">追加する</button>
  </div>
</div>

<script>
// ===== 定数 =====
const PRESETS = {
  veggie:  ['小松菜','ほうれん草','キャベツ','ピーマン','にんじん','新玉葱','レタス','白菜','トマト','なめこ','生姜','なす','レンコン','山芋','ごぼう','じゃがいも','水菜','きゅうり','えのき','しめじ','もやし'],
  meat:    ['豚バラ','豚ロース','豚肩','鶏むね','鶏もも','鶏ささみ','牛肩ロース','ひき肉','鮭','ハム','ベーコン'],
  dairy:   ['ヨーグルト','豆腐','油揚げ','納豆','さつま揚げ','キムチ','チーズ','卵','牛乳'],
  fruit:   ['キウイ','バナナ','りんご','みかん','いちご'],
  storage: ['お水','カップ麺','レトルトカレー','乾物','缶詰','パスタ','米','オリーブオイル','醤油','みそ']
};
const AUTO_DAYS = {
  '小松菜':4,'ほうれん草':4,'水菜':4,'もやし':3,'レタス':5,'キャベツ':14,
  'ピーマン':7,'きゅうり':5,'トマト':5,'なす':5,'にんじん':21,'新玉葱':21,
  'じゃがいも':21,'ごぼう':14,'レンコン':7,'山芋':7,'生姜':14,'白菜':7,
  'えのき':5,'しめじ':5,'なめこ':5,'キウイ':7,'バナナ':5,'りんご':14,'みかん':14,'いちご':4
};
const CAT_LABEL = {
  veggie:'🥬 野菜', meat:'🥩 肉・魚', dairy:'🥛 乳製品', fruit:'🍎 果物', storage:'🥫 保存食'
};
const TAB_KEYS = ['all','veggie','meat','dairy','fruit','storage','report','rules'];

// ===== 状態 =====
let currentYM  = todayYM();
let items      = [];
let currentTab = 'all';
let selPreset  = '';

// ===== ユーティリティ =====
function todayYM() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function storageKey(ym) { return 'foodItems_' + ym; }

// ===== データ管理 =====

function loadItems() {
  // 旧データ（foodItems）を今月へ移行
  const legacy = localStorage.getItem('foodItems');
  if (legacy) {
    try {
      const old = JSON.parse(legacy);
      if (!localStorage.getItem(storageKey(todayYM()))) {
        const migrated = old.map(i => ({ ...i, status: (i.qty > 0 ? 'active' : 'used') }));
        localStorage.setItem(storageKey(todayYM()), JSON.stringify(migrated));
      }
    } catch(e) {}
    localStorage.removeItem('foodItems');
  }
  // 初回のみ初期データを投入
  const key = storageKey('2026-05');
  if (!localStorage.getItem(key)) {
    localStorage.setItem(key, JSON.stringify(INITIAL_DATA));
  }
  items = JSON.parse(localStorage.getItem(storageKey(currentYM)) || '[]');
}

function save() {
  localStorage.setItem(storageKey(currentYM), JSON.stringify(items));
}

// ===== 月ナビ =====
function updateMonthNav() {
  const [y, m] = currentYM.split('-').map(Number);
  const isNow  = currentYM === todayYM();
  const el = document.getElementById('month-label');
  el.textContent  = y + '年' + m + '月';
  el.className    = 'month-label' + (isNow ? '' : ' past');
  const btn = document.getElementById('btn-today');
  btn.className   = 'btn-today' + (isNow ? '' : ' show');
}

function shiftMonth(delta) {
  const [y, m] = currentYM.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  currentYM = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  loadItems();
  updateMonthNav();
  render();
}
function prevMonth()        { shiftMonth(-1); }
function nextMonth()        { shiftMonth(+1); }
function goToCurrentMonth() { currentYM = todayYM(); loadItems(); updateMonthNav(); render(); }

// ===== 期限ステータス =====
function daysLeft(expiry, frozen) {
  if (!expiry) return 999;
  const today = new Date(); today.setHours(0,0,0,0);
  const diff  = Math.ceil((new Date(expiry) - today) / 86400000);
  return frozen ? diff + 30 : diff;
}
function expStatus(item) {
  const d = daysLeft(item.expiry, item.frozen);
  if (d <= 0) return 'expired';
  if (d <= 3) return 'urgent';
  if (d <= 7) return 'warning';
  return 'ok';
}
function expLabel(item) {
  if (!item.expiry) return '';
  const d = daysLeft(item.expiry, item.frozen);
  if (d <= 0) return '期限切れ';
  if (d === 1) return '今日まで！';
  if (d === 2) return '明日まで！';
  return 'あと' + d + '日';
}

// ===== レンダリング =====
function render() {
  const isReport = currentTab === 'report';
  const isRules  = currentTab === 'rules';
  document.getElementById('fab').style.display = (isReport || isRules) ? 'none' : 'flex';
  document.getElementById('alert-urgent').classList.remove('show');
  document.getElementById('alert-warning').classList.remove('show');

  if (isReport) { renderReport(); return; }
  if (isRules)  { renderRules();  return; }

  // アクティブ食材のアラート
  const active = items.filter(i => (!i.status || i.status === 'active') && i.qty > 0);
  const filtered = currentTab === 'all' ? active : active.filter(i => i.category === currentTab);
  const urgent  = filtered.filter(i => { const s = expStatus(i); return s === 'urgent' || s === 'expired'; });
  const warning = filtered.filter(i => expStatus(i) === 'warning');

  if (urgent.length > 0) {
    const el = document.getElementById('alert-urgent');
    el.textContent = '🔴 期限間近！ ' + urgent.map(i => i.name).join('・') + ' を早めに使って！';
    el.classList.add('show');
  }
  if (warning.length > 0) {
    const el = document.getElementById('alert-warning');
    el.textContent = '🟡 今週中に使い切ろう！ ' + warning.map(i => i.name).join('・');
    el.classList.add('show');
  }

  // 表示対象（全ステータス）
  let all = items.filter(i => i.qty > 0 || i.status === 'used' || i.status === 'discarded');
  if (currentTab !== 'all') all = all.filter(i => i.category === currentTab);

  if (all.length === 0) {
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div class="emoji">🛒</div>
        <p>この月の食材がまだ登録されていないよ<br>＋ボタンで追加してね！</p>
      </div>`;
    return;
  }

  const activeAll   = all.filter(i => !i.status || i.status === 'active');
  const usedAll     = all.filter(i => i.status === 'used');
  const discardAll  = all.filter(i => i.status === 'discarded');

  // アクティブをグループ分け
  const groups = {};
  activeAll.sort((a,b) => daysLeft(a.expiry,a.frozen) - daysLeft(b.expiry,b.frozen));
  activeAll.forEach(item => {
    const s = expStatus(item);
    const key = (s === 'expired' || s === 'urgent') ? '🔴 今すぐ使って！'
              : s === 'warning'                      ? '🟡 今週中に使おう'
              :                                        '🟢 余裕あり';
    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  });

  let html = '';
  ['🔴 今すぐ使って！','🟡 今週中に使おう','🟢 余裕あり'].forEach(key => {
    if (!groups[key]) return;
    html += '<div class="section"><div class="section-title">' + key + '</div>';
    groups[key].forEach(item => { html += buildCard(item); });
    html += '</div>';
  });
  if (usedAll.length > 0) {
    html += '<div class="section"><div class="section-title">✅ 使い切った（' + usedAll.length + '件）</div>';
    usedAll.forEach(item => { html += buildCard(item); });
    html += '</div>';
  }
  if (discardAll.length > 0) {
    html += '<div class="section"><div class="section-title">🗑️ 廃棄した（' + discardAll.length + '件）</div>';
    discardAll.forEach(item => { html += buildCard(item); });
    html += '</div>';
  }

  document.getElementById('content').innerHTML = html;
}

function buildCard(item) {
  const st       = item.status || 'active';
  const isActive = st === 'active';
  const es       = isActive ? expStatus(item) : '';

  let cardClass = '';
  if      (st === 'used')                              cardClass = 'status-used';
  else if (st === 'discarded')                         cardClass = 'status-discarded';
  else if (es === 'urgent' || es === 'expired')        cardClass = 'urgent';
  else if (es === 'warning')                           cardClass = 'warning';
  else                                                 cardClass = 'ok';

  // バッジ
  let badges = '';
  if (item.frozen) badges += '<span class="item-badge badge-frozen">❄️ 冷凍中</span>';
  if (st === 'used')      badges += '<span class="item-badge badge-used">✓ 使い切った</span>';
  else if (st === 'discarded') badges += '<span class="item-badge badge-discard">✗ 廃棄した</span>';
  else {
    const lbl = expLabel(item);
    if (lbl) {
      const bc = (es === 'urgent' || es === 'expired') ? 'badge-urgent'
               : es === 'warning'                      ? 'badge-warning'
               :                                         'badge-ok';
      badges += '<span class="item-badge ' + bc + '">' + lbl + '</span>';
    }
  }

  // アクション
  let actions = '';
  if (isActive) {
    actions =
      '<div class="qty-control">' +
        '<button class="qty-btn" onclick="changeQty(\'' + item.id + '\',-1)">−</button>' +
        '<div class="qty-display">' + item.qty + '</div>' +
        '<button class="qty-btn" onclick="changeQty(\'' + item.id + '\',+1)">＋</button>' +
      '</div>' +
      (item.category === 'meat'
        ? '<button class="btn-freeze' + (item.frozen?' frozen':'') + '" onclick="toggleFreeze(\'' + item.id + '\')">' + (item.frozen?'❄️ 冷凍中':'🧊 冷凍') + '</button>'
        : '') +
      '<button class="btn-used"    onclick="setStatus(\'' + item.id + '\',\'used\')">✓ 使い切った</button>' +
      '<button class="btn-discard" onclick="setStatus(\'' + item.id + '\',\'discarded\')">✗ 廃棄</button>' +
      '<button class="btn-delete"  onclick="deleteItem(\'' + item.id + '\')">🗑️</button>';
  } else {
    actions =
      '<button class="btn-restore" onclick="setStatus(\'' + item.id + '\',\'active\')">↩ 在庫に戻す</button>' +
      '<button class="btn-delete"  onclick="deleteItem(\'' + item.id + '\')">🗑️</button>';
  }

  return '<div class="item-card ' + cardClass + '" id="card-' + item.id + '">' +
    '<div class="item-top">' +
      '<div class="item-name">' + item.name + '</div>' +
      '<div class="badge-wrap">' + badges + '</div>' +
    '</div>' +
    '<div class="item-info">' +
      '<span>📦 ' + item.qty + '個</span>' +
      (item.expiry ? '<span>📅 ' + item.expiry + '</span>' : '') +
      '<span>' + (CAT_LABEL[item.category] || item.category) + '</span>' +
    '</div>' +
    (item.frozen ? '<div class="frozen-note">❄️ 冷凍保存中（実質+30日）</div>' : '') +
    '<div class="item-actions">' + actions + '</div>' +
  '</div>';
}

// ===== レポート =====
function renderReport() {
  const [y, m] = currentYM.split('-').map(Number);
  const total    = items.length;
  const usedCnt  = items.filter(i => i.status === 'used').length;
  const discCnt  = items.filter(i => i.status === 'discarded').length;
  const activeCnt = total - usedCnt - discCnt;

  if (total === 0) {
    document.getElementById('content').innerHTML =
      '<div class="report-card"><div style="text-align:center;padding:30px;color:var(--text-light);font-size:14px">' +
      '📊 この月にはまだ食材が登録されていません</div></div>';
    return;
  }

  const usedPct = Math.round(usedCnt / total * 100);
  const discPct = Math.round(discCnt / total * 100);

  // カテゴリ別集計
  const catRows = ['veggie','meat','dairy','fruit','storage'].map(cat => {
    const ci   = items.filter(i => i.category === cat);
    const disc = ci.filter(i => i.status === 'discarded').length;
    if (ci.length === 0) return '';
    const pct  = Math.round(disc / ci.length * 100);
    const [cls, lbl] = pct >= 30 ? ['loss-high','ロス '+pct+'%']
                     : pct >= 10 ? ['loss-mid', 'ロス '+pct+'%']
                     : pct >  0  ? ['loss-low', 'ロス '+pct+'%']
                     :             ['loss-none','ロスなし'];
    return '<div class="cat-row">' +
      '<span class="cat-name">'  + CAT_LABEL[cat] + '</span>' +
      '<span class="cat-nums">計' + ci.length + '点 / 廃棄' + disc + '点</span>' +
      '<span class="loss-badge ' + cls + '">' + lbl + '</span>' +
    '</div>';
  }).join('');

  // アドバイス
  const worstCat = ['veggie','meat','dairy','fruit','storage']
    .map(cat => ({ cat, disc: items.filter(i => i.category===cat && i.status==='discarded').length }))
    .sort((a,b) => b.disc - a.disc)[0];
  let advice = '';
  if (discCnt === 0 && activeCnt === 0) {
    advice = '🎉 今月は食品ロスゼロ！完璧です！';
  } else if (discCnt === 0) {
    advice = '👍 廃棄ゼロをキープ中！このまま続けよう！';
  } else if (worstCat && worstCat.disc > 0) {
    advice = CAT_LABEL[worstCat.cat] + 'の廃棄が多めです。次月は買う量を少し減らしてみよう。';
  }

  document.getElementById('content').innerHTML =
    '<div class="report-card">' +
      '<div class="report-title">📊 ' + y + '年' + m + '月のレポート</div>' +
      '<div class="stat-grid">' +
        '<div class="stat-box"><div class="stat-num gray">'  + total   + '</div><div class="stat-label">登録した食材</div></div>' +
        '<div class="stat-box"><div class="stat-num green">' + usedCnt + '</div><div class="stat-label">使い切った</div><div class="stat-pct" style="color:var(--green)">' + usedPct + '%</div></div>' +
        '<div class="stat-box"><div class="stat-num red">'   + discCnt + '</div><div class="stat-label">廃棄した</div><div class="stat-pct" style="color:var(--red)">' + discPct + '%</div></div>' +
      '</div>' +
      '<div class="progress-wrap"><div class="progress-label">使い切り率</div><div class="progress-bar"><div class="progress-fill green" style="width:' + usedPct + '%"></div></div></div>' +
      '<div class="progress-wrap"><div class="progress-label">廃棄率</div><div class="progress-bar"><div class="progress-fill red" style="width:' + discPct + '%"></div></div></div>' +
      (advice ? '<div class="advice-box">' + advice + '</div>' : '') +
    '</div>' +
    '<div class="report-card">' +
      '<div class="report-title">📂 カテゴリ別の食品ロス傾向</div>' +
      (catRows || '<div style="color:var(--text-light);font-size:13px;text-align:center;padding:16px">データなし</div>') +
    '</div>' +
    (activeCnt > 0
      ? '<div class="report-card" style="background:var(--yellow-light);border:1px solid var(--yellow)">' +
          '<div style="font-size:13px">📦 まだ在庫として残っている食材が <strong>' + activeCnt + '点</strong> あります</div>' +
          '<div style="font-size:12px;color:var(--text-light);margin-top:4px">使い切ったら「✓ 使い切った」、捨てたら「✗ 廃棄」を押してね</div>' +
        '</div>'
      : '');
}

// ===== 操作 =====
function changeQty(id, delta) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.qty = Math.max(0, item.qty + delta);
  save(); render();
}
function toggleFreeze(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.frozen = !item.frozen;
  save(); render();
}
function setStatus(id, status) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.status = status;
  save(); render();
}
function deleteItem(id) {
  if (!confirm('この食材を削除しますか？')) return;
  items = items.filter(i => i.id !== id);
  save(); render();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', TAB_KEYS[i] === tab);
  });
  render();
}

  document.getElementById('expiry-hint').textContent =
    (cat === 'veggie' || cat === 'fruit') ? '野菜・果物は食材名を選ぶと自動入力されます'
    : cat === 'meat'    ? 'パックに記載の賞味期限を入力してね'
    : cat === 'storage' ? '保存食の賞味期限を入力してね' : '';
  selPreset = '';
}
function selectPreset(name) {
  selPreset = name;
  document.getElementById('input-name').value = name;
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent === name);
  });
  const cat = document.getElementById('input-category').value;
  if ((cat === 'veggie' || cat === 'fruit') && AUTO_DAYS[name]) {
    const d = new Date();
    d.setDate(d.getDate() + AUTO_DAYS[name]);
    document.getElementById('input-expiry').value = d.toISOString().split('T')[0];
    document.getElementById('expiry-hint').textContent = '📅 ' + name + 'の目安：' + AUTO_DAYS[name] + '日間';
  }
}
function addItem() {
  const name   = document.getElementById('input-name').value.trim();
  const cat    = document.getElementById('input-category').value;
  const qty    = parseInt(document.getElementById('input-qty').value) || 1;
  const expiry = document.getElementById('input-expiry').value;
  const frozen = cat === 'meat' && document.getElementById('input-freeze').value === 'yes';
  if (!name) { alert('食材名を入力してね！'); return; }
  items.push({
    id: Date.now().toString(),
    name, category: cat, qty, expiry, frozen,
    status: 'active',
    addedDate: new Date().toISOString().split('T')[0]
  });
  save(); closeModal(); render();
}

// ===== 初期化 =====
loadItems();
updateMonthNav();
render();
</script>
</body>
</html>
